name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export for web
        run: npx expo export
        env:
          EXPO_PUBLIC_SUPABASE_URL: "https://rohyoxuszxrnylocolqu.supabase.co"
          EXPO_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJvaHlveHVzenhybnlsb2NvbHF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NDkxNjAsImV4cCI6MjA4ODIyNTE2MH0.9nPvKdsxlSFMeisP7Dr6nQo4HdPzb0U2DOGoXizCoKE"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
